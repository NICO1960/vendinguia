<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>VendinGuía</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --text: #ffffff;
    --muted: #a0a0b8;
    --border: #5a5a7a;
    --saved: #ffd166;
  }

  body.light {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #e8edf2;
    --accent: #0077aa;
    --accent2: #cc4400;
    --text: #111122;
    --muted: #556677;
    --border: #c8d4de;
    --saved: #cc8800;
  }

  body.light::before { display: none; }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* FONDO ANIMADO */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(0,229,255,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255,107,53,0.04) 0%, transparent 50%);
    animation: bgPulse 8s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes bgPulse {
    0% { transform: scale(1) rotate(0deg); }
    100% { transform: scale(1.1) rotate(3deg); }
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 0 16px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  header {
    padding: 32px 0 24px;
    text-align: center;
  }

  .logo {
    font-size: clamp(26px, 5vw, 40px);
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 6px;
    white-space: nowrap;
    text-shadow: 0 0 40px rgba(0,229,255,0.35);
  }

  h1 {
    font-size: clamp(12px, 2.5vw, 15px);
    font-weight: 600;
    white-space: nowrap;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .subtitle {
    font-size: 11px;
    color: #3a3a50;
    margin-top: 4px;
    font-family: 'Space Mono', monospace;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    transition: all 0.2s;
    border: none;
    background: transparent;
    font-family: 'Syne', sans-serif;
  }

  .tab.active {
    background: var(--surface2);
    color: var(--accent);
    border: 1px solid var(--border);
  }

  /* BUSCADOR */
  .search-section { margin-bottom: 20px; }

  .search-box {
    position: relative;
    margin-bottom: 12px;
  }

  .search-input {
    width: 100%;
    padding: 16px 56px 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-size: 16px;
    font-family: 'Syne', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,255,0.1);
  }

  .search-input::placeholder { color: var(--muted); }

  .search-btn {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--accent);
    border: none;
    border-radius: 10px;
    width: 40px;
    height: 40px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-size: 18px;
  }

  .search-btn:hover { background: #00c8e0; transform: translateY(-50%) scale(1.05); }
  .search-btn:active { transform: translateY(-50%) scale(0.97); }

  /* FILTROS */
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Syne', sans-serif;
  }

  .filter-btn.active, .filter-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,255,0.08);
  }

  /* ESTADO CARGANDO */
  .loading {
    display: none;
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
  }

  .loading.visible { display: block; }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* RESULTADO IA */
  .ai-response {
    display: none;
    background: var(--surface);
    border: 1px solid rgba(0,229,255,0.3);
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 16px;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
  }

  .ai-response.visible { display: block; }

  .ai-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  /* CARDS */
  .results { display: flex; flex-direction: column; gap: 12px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    transition: all 0.2s;
    animation: slideIn 0.3s ease both;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card:hover { border-color: rgba(0,229,255,0.3); transform: translateY(-1px); }
  .card:hover::before { opacity: 1; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
    gap: 12px;
  }

  .card-name {
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.2;
  }

  .card-city {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    background: rgba(0,229,255,0.1);
    border: 1px solid rgba(0,229,255,0.2);
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .card-rubro {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 700;
  }

  .card-desc {
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 12px;
    font-weight: 400;
    opacity: 0.85;
  }

  .card-precio {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    margin-bottom: 12px;
  }

  .card-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 8px 14px;
    border-radius: 8px;
    border: none;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.15s;
    text-decoration: none;
  }

  .btn-web {
    background: rgba(0,229,255,0.12);
    color: var(--accent);
    border: 1px solid rgba(0,229,255,0.25);
  }
  .btn-web:hover { background: rgba(0,229,255,0.2); }

  .btn-wa {
    background: rgba(37,211,102,0.12);
    color: #25d366;
    border: 1px solid rgba(37,211,102,0.25);
  }
  .btn-wa:hover { background: rgba(37,211,102,0.2); }

  .btn-wa-off {
    background: rgba(255,255,255,0.03);
    color: var(--muted);
    border: 1px dashed #2a2a3a;
    cursor: default;
    opacity: 0.5;
  }

  .btn-save {
    background: rgba(255,209,102,0.1);
    color: var(--saved);
    border: 1px solid rgba(255,209,102,0.2);
    margin-left: auto;
  }
  .btn-save:hover { background: rgba(255,209,102,0.2); }
  .btn-save.saved { background: rgba(255,209,102,0.25); }

  /* GUARDADOS */
  .saved-section { display: none; }
  .saved-section.visible { display: block; }

  .saved-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    line-height: 1.8;
  }

  .saved-empty .icon { font-size: 40px; margin-bottom: 16px; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    line-height: 1.8;
  }

  .empty-state .icon { font-size: 40px; margin-bottom: 16px; }

  /* SUGERENCIAS */
  .suggestions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 16px;
    justify-content: center;
  }

  .suggestion {
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px dashed var(--border);
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Space Mono', monospace;
  }

  .suggestion:hover { border-color: var(--accent); color: var(--accent); }

  footer {
    text-align: center;
    padding: 32px 0 24px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">▸ VendinGuía ◂</div>
    <h1>Buscador de Proveedores</h1>
    <p class="subtitle">// uso interno · operación vending</p>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="showTab('buscar')">🔍 Buscar</button>
    <button class="tab" onclick="showTab('guardados')">⭐ Guardados <span id="saved-count"></span></button>
  </div>

  <!-- SECCIÓN BUSCAR -->
  <div id="tab-buscar">
    <div class="search-section">
      <div class="filters" style="margin-bottom:12px">
        <button class="filter-btn active" onclick="setFiltro('todos', this)">Todos</button>
        <button class="filter-btn" onclick="setFiltro('Mar del Plata', this)">Mar del Plata</button>
        <button class="filter-btn" onclick="setFiltro('La Plata', this)">La Plata</button>
        <button class="filter-btn" onclick="setFiltro('Buenos Aires', this)">Buenos Aires</button>
        <button class="filter-btn" onclick="setFiltro('Nacional', this)">Nacional</button>
      </div>
      <div class="search-box">
        <input
          type="text"
          class="search-input"
          id="searchInput"
          placeholder="Ej: agua 500ml, preservativos, energizante..."
          onkeydown="if(event.key==='Enter') buscar()"
        >
        <button class="search-btn" id="voiceBtn" onclick="iniciarVoz()" title="Búsqueda por voz" style="right:52px; background:#e8e8f0; border:1px solid #ccccdd; color:#333344; flex-shrink:0;">🎤</button>
        <button class="search-btn" onclick="buscar()">→</button>
      </div>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      Consultando proveedores...
    </div>

    <div class="ai-response" id="aiResponse">
      <div class="ai-label">▸ análisis IA</div>
      <div id="aiText"></div>
    </div>

    <div class="results" id="results"></div>

    <div class="empty-state" id="emptyState">
      <div class="icon">📦</div>
      Ingresá un producto para buscar<br>entre los proveedores relevados
    </div>
  </div>

  <!-- SECCIÓN GUARDADOS -->
  <div id="tab-guardados" class="saved-section">
    <div id="savedList"></div>
  </div>

  <footer>
    <button id="themeBtn" onclick="toggleTheme()" style="
      background:var(--surface); border:1px solid var(--border);
      color:var(--muted); border-radius:20px; padding:7px 16px;
      font-size:12px; cursor:pointer; font-family:'Space Mono',monospace;
      transition:all 0.2s; margin-bottom:10px;
    ">☀️ Modo claro</button>
    <br>VendinGuía v0.1 · datos actualizados marzo 2026
  </footer>
</div>

// ESTADO
// ═══════════════════════════════════════════
let filtroActivo = "todos";
let savedIds = JSON.parse(localStorage.getItem("vg_saved") || "[]");

function saveState() {
  localStorage.setItem("vg_saved", JSON.stringify(savedIds));
  updateSavedCount();
}

function updateSavedCount() {
  const el = document.getElementById("saved-count");
  el.textContent = savedIds.length > 0 ? `(${savedIds.length})` : "";
}

updateSavedCount();

// ═══════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════
function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');

  if (tab === 'buscar') {
    document.getElementById('tab-buscar').style.display = 'block';
    document.getElementById('tab-guardados').classList.remove('visible');
  } else {
    document.getElementById('tab-buscar').style.display = 'none';
    document.getElementById('tab-guardados').classList.add('visible');
    renderSaved();
  }
}

// ═══════════════════════════════════════════
// FILTROS
// ═══════════════════════════════════════════
function setFiltro(ciudad, btn) {
  filtroActivo = ciudad;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ═══════════════════════════════════════════
// BUSCAR
// ═══════════════════════════════════════════
async function buscar() {
  const query = document.getElementById("searchInput").value.trim();
  if (!query) return;
  buscarDirecto(query);
}

async function buscarDirecto(query) {
  document.getElementById("searchInput").value = query;
  document.getElementById("loading").classList.add("visible");
  document.getElementById("results").innerHTML = "";
  document.getElementById("aiResponse").classList.remove("visible");
  document.getElementById("emptyState").style.display = "none";

  // Mostrar TODOS los proveedores (filtrados solo por ciudad si aplica)
  // La selección de cuáles son relevantes la hace el usuario a partir del análisis IA
  let filtrados = PROVEEDORES.filter(p =>
    filtroActivo === "todos" || p.ciudad === filtroActivo
  );

  // Llamada a IA
  try {
    const proveedoresTexto = PROVEEDORES.map(p =>
      `[${p.ciudad}] ${p.nombre} — ${p.rubro}: ${p.descripcion} Tags: ${p.tags.join(", ")}`
    ).join("\n");

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: `Sos un asistente de abastecimiento para máquinas vending en Argentina. 
El operador busca productos para reponer sus máquinas. 
Tenés esta base de proveedores:\n${proveedoresTexto}\n
Cuando el operador busque un producto, respondé en 2-3 oraciones cortas y directas:
1. Cuáles son los mejores proveedores para ese producto (por nombre)
2. Algún dato práctico relevante (precio, zona, condición)
No uses formato markdown ni listas. Hablá en español rioplatense, tono directo.
Si no hay proveedor para ese producto, decilo claramente.`,
        messages: [{ role: "user", content: `Busco: ${query}. Filtro ciudad: ${filtroActivo}` }]
      })
    });

    const data = await response.json();
    const aiText = data.content?.[0]?.text || "";
    if (aiText) {
      document.getElementById("aiText").textContent = aiText;
      document.getElementById("aiResponse").classList.add("visible");
    }
  } catch(e) {
    // Si falla la IA, igual muestro resultados
  }

  document.getElementById("loading").classList.remove("visible");

  if (filtrados.length === 0) {
    document.getElementById("results").innerHTML = `
      <div class="empty-state">
        <div class="icon">🔍</div>
        No encontré proveedores para "${query}"${filtroActivo !== 'todos' ? ` en ${filtroActivo}` : ''}<br>
        <span style="font-size:11px">Probá con otro término o cambiá el filtro de ciudad</span>
      </div>`;
  } else {
    renderCards(filtrados);
  }
}

function renderCards(lista) {
  const container = document.getElementById("results");
  container.innerHTML = lista.map((p, i) => `
    <div class="card" style="animation-delay:${i * 0.05}s">
      <div class="card-header">
        <div class="card-name">${p.nombre}</div>
        <div class="card-city">${p.ciudad}</div>
      </div>
      <div class="card-rubro">${p.rubro}</div>
      <div class="card-desc">${p.descripcion}</div>
      ${p.precio ? `<div class="card-precio">💲 ${p.precio}</div>` : ""}
      <div class="card-actions">
        ${p.web ? `<a class="btn btn-web" href="${p.web}" target="_blank">🌐 Web</a>` : ""}
        ${p.wa
          ? `<a class="btn btn-wa" href="https://wa.me/${p.wa}" target="_blank">💬 WhatsApp</a>`
          : `<span class="btn btn-wa-off">💬 Sin WA</span>`
        }
        <button class="btn btn-save ${savedIds.includes(p.id) ? 'saved' : ''}"
          onclick="toggleSave(${p.id}, this)">
          ${savedIds.includes(p.id) ? '⭐ Guardado' : '☆ Guardar'}
        </button>
      </div>
    </div>
  `).join("");
}

// ═══════════════════════════════════════════
// GUARDADOS
// ═══════════════════════════════════════════
function toggleSave(id, btn) {
  if (savedIds.includes(id)) {
    savedIds = savedIds.filter(x => x !== id);
    btn.textContent = "☆ Guardar";
    btn.classList.remove("saved");
  } else {
    savedIds.push(id);
    btn.textContent = "⭐ Guardado";
    btn.classList.add("saved");
  }
  saveState();
}

function renderSaved() {
  const container = document.getElementById("savedList");
  if (savedIds.length === 0) {
    container.innerHTML = `
      <div class="saved-empty">
        <div class="icon">⭐</div>
        Todavía no guardaste ningún proveedor.<br>
        Buscá un producto y tocá "Guardar"<br>en los resultados que te interesen.
      </div>`;
    return;
  }
  const lista = PROVEEDORES.filter(p => savedIds.includes(p.id));
  container.innerHTML = `<div class="results">` + lista.map((p, i) => `
    <div class="card" style="animation-delay:${i * 0.05}s">
      <div class="card-header">
        <div class="card-name">${p.nombre}</div>
        <div class="card-city">${p.ciudad}</div>
      </div>
      <div class="card-rubro">${p.rubro}</div>
      <div class="card-desc">${p.descripcion}</div>
      ${p.precio ? `<div class="card-precio">💲 ${p.precio}</div>` : ""}
      <div class="card-actions">
        ${p.web ? `<a class="btn btn-web" href="${p.web}" target="_blank">🌐 Web</a>` : ""}
        ${p.wa
          ? `<a class="btn btn-wa" href="https://wa.me/${p.wa}" target="_blank">💬 WhatsApp</a>`
          : `<span class="btn btn-wa-off">💬 Sin WA</span>`
        }
        <button class="btn btn-save saved" onclick="toggleSave(${p.id}, this); renderSaved()">
          ⭐ Guardado
        </button>
      </div>
    </div>
  `).join("") + `</div>`;
}
// ═══════════════════════════════════════════
// BÚSQUEDA POR VOZ
// ═══════════════════════════════════════════
function iniciarVoz() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    alert("Tu navegador no soporta búsqueda por voz. Probá con Chrome.");
    return;
  }
  const rec = new SpeechRecognition();
  rec.lang = 'es-AR';
  rec.interimResults = false;
  const btn = document.getElementById('voiceBtn');
  btn.textContent = '🔴';
  btn.style.color = '#ff4444';
  rec.onresult = (e) => {
    const texto = e.results[0][0].transcript;
    document.getElementById('searchInput').value = texto;
    btn.textContent = '🎤';
    btn.style.color = '';
    buscar();
  };
  rec.onerror = () => { btn.textContent = '🎤'; btn.style.color = ''; };
  rec.onend = () => { btn.textContent = '🎤'; btn.style.color = ''; };
  rec.start();
}


function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  localStorage.setItem('vg_theme', isLight ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isLight ? '🌙 Modo oscuro' : '☀️ Modo claro';
}

// Aplicar tema guardado al cargar
(function() {
  if (localStorage.getItem('vg_theme') === 'light') {
    document.body.classList.add('light');
    document.getElementById('themeBtn').textContent = '🌙 Modo oscuro';
  }
})();
</script>
